name: CI

on:
  push:
    branches: [main, refactor]
  pull_request:

jobs:
  frontend:
    name: Frontend, Architecture, and Organization
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Workflow metadata name check
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REF: ${{ github.head_ref }}
        run: pnpm check:workflow-names
      - run: pnpm check:line-endings
      - run: pnpm check:architecture
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:allow-empty
      - run: pnpm build
      - run: pnpm perf:size
      - run: pnpm check:docs
      - name: Discovery metadata check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm check:discovery -- --pr-aware
          else
            pnpm check:discovery
          fi
      - name: Unused code check
        run: pnpm check:unused

  rust:
    name: Rust Capability Layer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest,cargo-deny,cargo-machete
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - run: cargo check --manifest-path src-tauri/Cargo.toml --workspace
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --workspace --all-targets -- -D warnings
      - run: cargo nextest run --manifest-path src-tauri/Cargo.toml --workspace
      - name: Rust dependency policy report
        run: cargo deny --manifest-path src-tauri/Cargo.toml check --config deny.toml
        continue-on-error: true
      - name: Unused Rust dependency report
        run: cargo machete src-tauri
        continue-on-error: true

  smoke:
    name: Browser Smoke and Performance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:ui:run
      - run: pnpm perf:lighthouse
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
